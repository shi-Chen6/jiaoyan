<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>教研数据大屏 - 反馈数据看板</title>
    <style>
        :root {
            --bg-deep: #060b18;
            --bg-panel: #0d1328;
            --bg-card: #111b33;
            --bg-card-hover: #162044;
            --border-glow: #1a2755;
            --border-bright: #2a3f80;
            --accent-cyan: #06d6f0;
            --accent-purple: #8b5cf6;
            --accent-gold: #f0c060;
            --accent-pink: #e8608c;
            --accent-green: #34d399;
            --text-primary: #e8ecf4;
            --text-secondary: #b0bdd4;
            --text-muted: #6b7d9e;
            --shadow-glow-cyan: 0 0 24px rgba(6, 214, 240, 0.2);
            --shadow-glow-purple: 0 0 28px rgba(139, 92, 246, 0.18);
            --shadow-glow-gold: 0 0 20px rgba(240, 192, 96, 0.18);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-display: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', -apple-system,
                sans-serif;
            --font-mono: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', 'Consolas', monospace;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --max-width: 680px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-display);
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
            position: relative;
            line-height: 1.5;
        }

        /* Canvas 粒子背景 */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.7;
        }

        /* 网格线背景叠加 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.15) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: -1px -1px;
            mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
            -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 75%);
        }

        /* 主容器 */
        .app-container {
            width: 100%;
            max-width: var(--max-width);
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
            padding: 12px 14px 32px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ========== 顶部标题栏 ========== */
        .header {
            text-align: center;
            padding: 18px 8px 6px;
            position: relative;
        }
        .header-title {
            font-family: var(--font-display);
            font-size: 1.35rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #e0e8f8 0%, #a0c8f0 40%, #c8b8f8 70%, #e0d8f8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            margin-bottom: 2px;
            text-shadow: none;
        }
        .header-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            font-weight: 400;
            text-transform: uppercase;
        }
        .header-live-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent-green);
            margin-right: 5px;
            animation: livePulse 1.8s ease-in-out infinite;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }
        @keyframes livePulse {
            0%,
            100% {
                box-shadow: 0 0 4px var(--accent-green), 0 0 10px rgba(52, 211, 153, 0.5);
            }
            50% {
                box-shadow: 0 0 8px var(--accent-green), 0 0 22px rgba(52, 211, 153, 0.8);
            }
        }

        /* ========== 统计卡片区 ========== */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            padding: 14px 12px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-smooth);
            cursor: default;
            text-align: center;
        }
        .stat-card:hover {
            border-color: var(--border-bright);
            box-shadow: var(--shadow-glow-cyan);
            transform: translateY(-1px);
        }
        .stat-card .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 4px;
            display: block;
        }
        .stat-card .stat-value {
            font-family: var(--font-mono);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #ffffff;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            margin-top: 2px;
            text-transform: uppercase;
        }
        .stat-card.accent-cyan .stat-value {
            color: var(--accent-cyan);
            text-shadow: 0 0 18px rgba(6, 214, 240, 0.4);
        }
        .stat-card.accent-purple .stat-value {
            color: var(--accent-purple);
            text-shadow: 0 0 18px rgba(139, 92, 246, 0.4);
        }
        .stat-card.accent-gold .stat-value {
            color: var(--accent-gold);
            text-shadow: 0 0 18px rgba(240, 192, 96, 0.4);
        }
        .stat-card.accent-pink .stat-value {
            color: var(--accent-pink);
            text-shadow: 0 0 18px rgba(232, 96, 140, 0.4);
        }
        .stat-card .stat-card-glow {
            position: absolute;
            top: -30%;
            right: -20%;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.12;
            filter: blur(24px);
        }
        .stat-card.accent-cyan .stat-card-glow {
            background: var(--accent-cyan);
        }
        .stat-card.accent-purple .stat-card-glow {
            background: var(--accent-purple);
        }
        .stat-card.accent-gold .stat-card-glow {
            background: var(--accent-gold);
        }
        .stat-card.accent-pink .stat-card-glow {
            background: var(--accent-pink);
        }

        /* ========== 学科分布迷你柱状图 ========== */
        .subject-chart-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            padding: 14px 12px;
            transition: all var(--transition-smooth);
        }
        .subject-chart-panel:hover {
            border-color: var(--border-bright);
            box-shadow: var(--shadow-glow-purple);
        }
        .subject-chart-title {
            font-size: 0.72rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            text-transform: uppercase;
            text-align: center;
        }
        .subject-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 72px;
            padding: 0 2px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .subject-bars::-webkit-scrollbar {
            display: none;
        }
        .subject-bar-item {
            flex: 0 0 auto;
            min-width: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .subject-bar {
            width: 16px;
            border-radius: 3px 3px 0 0;
            background: linear-gradient(180deg, var(--accent-purple) 0%, rgba(139, 92, 246, 0.3) 100%);
            transition: all var(--transition-smooth);
            min-height: 3px;
            position: relative;
        }
        .subject-bar:hover {
            filter: brightness(1.4);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }
        .subject-bar-label {
            font-size: 0.5rem;
            color: var(--text-muted);
            white-space: nowrap;
            writing-mode: horizontal-tb;
            text-align: center;
            max-width: 28px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .subject-bar-count {
            font-size: 0.55rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-wrapper {
            flex: 1;
            min-width: 160px;
            position: relative;
        }
        .search-input {
            width: 100%;
            height: 44px;
            padding: 0 16px 0 38px;
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--text-primary);
            background: var(--bg-card);
            border: 1.5px solid var(--border-glow);
            border-radius: 22px;
            outline: none;
            transition: all var(--transition-smooth);
            letter-spacing: 0.03em;
        }
        .search-input::placeholder {
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }
        .search-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(6, 214, 240, 0.15);
            background: var(--bg-card-hover);
        }
        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            pointer-events: none;
            color: var(--text-muted);
        }
        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 50%;
            display: none;
            transition: all var(--transition-fast);
        }
        .search-clear.visible {
            display: block;
        }
        .search-clear:active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-tool {
            height: 44px;
            padding: 0 16px;
            font-family: var(--font-display);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            border-radius: 22px;
            cursor: pointer;
            border: 1.5px solid var(--border-glow);
            background: var(--bg-card);
            color: var(--text-secondary);
            transition: all var(--transition-smooth);
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
        }
        .btn-tool:active {
            transform: scale(0.95);
            transition: all 0.1s ease;
        }
        .btn-tool:hover {
            border-color: var(--border-bright);
            color: var(--text-primary);
        }
        .btn-tool.btn-export {
            border-color: rgba(240, 192, 96, 0.4);
            color: var(--accent-gold);
            box-shadow: 0 0 14px rgba(240, 192, 96, 0.08);
        }
        .btn-tool.btn-export:hover {
            border-color: var(--accent-gold);
            box-shadow: 0 0 22px rgba(240, 192, 96, 0.2);
        }
        .btn-tool.btn-refresh {
            border-color: rgba(6, 214, 240, 0.35);
            color: var(--accent-cyan);
        }
        .btn-tool.btn-refresh:hover {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 22px rgba(6, 214, 240, 0.2);
        }
        .btn-tool .btn-icon {
            font-size: 0.85rem;
        }

        /* 导出下拉菜单 */
        .export-dropdown {
            position: relative;
        }
        .export-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm);
            padding: 6px 0;
            min-width: 140px;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: all var(--transition-fast);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .export-menu.show {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        .export-menu-item {
            display: block;
            width: 100%;
            padding: 10px 18px;
            font-family: var(--font-display);
            font-size: 0.78rem;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            letter-spacing: 0.03em;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .export-menu-item:hover,
        .export-menu-item:active {
            background: var(--bg-card-hover);
            color: #fff;
        }
        .export-menu-item .export-format-badge {
            display: inline-block;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 6px;
            letter-spacing: 0.05em;
            font-weight: 600;
            vertical-align: middle;
        }
        .badge-csv {
            background: rgba(6, 214, 240, 0.18);
            color: var(--accent-cyan);
        }
        .badge-json {
            background: rgba(139, 92, 246, 0.18);
            color: var(--accent-purple);
        }
        .badge-xls {
            background: rgba(52, 211, 153, 0.18);
            color: var(--accent-green);
        }

        /* 学科筛选下拉 */
        .subject-filter-dropdown {
            position: relative;
        }
        .subject-filter-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm);
            padding: 6px 0;
            min-width: 140px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px);
            transition: all var(--transition-fast);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .subject-filter-menu.show {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        .subject-filter-item {
            display: block;
            width: 100%;
            padding: 10px 18px;
            font-family: var(--font-display);
            font-size: 0.78rem;
            color: var(--text-secondary);
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            letter-spacing: 0.03em;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .subject-filter-item:hover,
        .subject-filter-item:active {
            background: var(--bg-card-hover);
            color: #fff;
        }
        .subject-filter-item.active {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
        }

        /* 未提交教师弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 11, 24, 0.88);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }
        .modal-content {
            background: var(--bg-panel);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 560px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            transform: scale(0.92) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-overlay.show .modal-content {
            transform: scale(1) translateY(0);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-glow);
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent-pink);
            letter-spacing: 0.03em;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all var(--transition-fast);
            line-height: 1;
        }
        .modal-close:hover,
        .modal-close:active {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .modal-body {
            padding: 16px 18px;
            overflow-y: auto;
            flex: 1;
        }
        .modal-info {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 0.03em;
        }
        .modal-info span {
            color: var(--accent-pink);
            font-weight: 600;
        }
        .teacher-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .teacher-tag {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(232, 96, 140, 0.12);
            border: 1px solid rgba(232, 96, 140, 0.3);
            border-radius: 16px;
            font-size: 0.75rem;
            color: #f8b4c4;
            letter-spacing: 0.03em;
        }

        .teacher-group {
            margin-bottom: 16px;
        }

        .teacher-group:last-child {
            margin-bottom: 0;
        }

        .teacher-group-header {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--accent-gold);
            margin-bottom: 8px;
            padding-left: 8px;
            border-left: 3px solid var(--accent-gold);
            letter-spacing: 0.03em;
        }

        .teacher-group-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding-left: 12px;
        }

        /* ========== 数据列表区 ========== */
        .data-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .data-count-info {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.04em;
            text-align: center;
            padding: 2px 0;
        }
        .data-count-info span {
            color: var(--accent-cyan);
            font-weight: 600;
        }

        /* 卡片视图 */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .data-card {
            background: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            padding: 14px 14px;
            transition: all var(--transition-smooth);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .data-card:hover {
            border-color: var(--border-bright);
            box-shadow: var(--shadow-glow-cyan);
            transform: translateY(-1px);
        }
        .data-card:active {
            transform: scale(0.985);
            transition: all 0.1s ease;
        }
        .data-card .card-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .data-card .card-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            letter-spacing: 0.03em;
        }
        .data-card .card-subject-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            background: rgba(139, 92, 246, 0.2);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }
        .data-card .card-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }
        .data-card .card-preview {
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            letter-spacing: 0.02em;
        }
        .data-card .card-expand-indicator {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.04em;
            transition: all var(--transition-fast);
        }
        .data-card.expanded .card-expand-indicator {
            color: var(--accent-cyan);
        }
        .data-card .card-detail {
            display: none;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border-glow);
            animation: detailFadeIn 0.35s ease;
        }
        .data-card.expanded .card-detail {
            display: block;
        }
        @keyframes detailFadeIn {
            from {
                opacity: 0;
                transform: translateY(-6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .data-card .detail-row {
            margin-bottom: 8px;
            font-size: 0.73rem;
            line-height: 1.5;
        }
        .data-card .detail-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.65rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        .data-card .detail-value {
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }

        /* 表格视图（桌面端） */
        .table-wrapper {

        /* ========== Toast 提示 ========== */

        /* ========== 响应式 ========== */

        /* 减少动画 */

    </style>
</head>

    <script>
        (function() {
            // ============ DOM引用 ============
            const particleCanvas = document.getElementById('particleCanvas');
            const ctx = particleCanvas.getContext('2d');
            const appContainer = document.getElementById('appContainer');
            const toast = document.getElementById('toast');

            // 统计
            const statTotal = document.getElementById('statTotal');
            const statSubjects = document.getElementById('statSubjects');
            const statTeachers = document.getElementById('statTeachers');
            const statLatest = document.getElementById('statLatest');
            const subjectBars = document.getElementById('subjectBars');
            const subjectChartPanel = document.getElementById('subjectChartPanel');

            // 工具栏
            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            const btnRefresh = document.getElementById('btnRefresh');
            const btnExport = document.getElementById('btnExport');
            const exportMenu = document.getElementById('exportMenu');
            const exportDropdown = document.getElementById('exportDropdown');
            const subjectFilterDropdown = document.getElementById('subjectFilterDropdown');
            const btnSubjectFilter = document.getElementById('btnSubjectFilter');
            const subjectFilterLabel = document.getElementById('subjectFilterLabel');
            const subjectFilterMenu = document.getElementById('subjectFilterMenu');
            const btnUnsubmitted = document.getElementById('btnUnsubmitted');
            const unsubmittedModal = document.getElementById('unsubmittedModal');
            const modalClose = document.getElementById('modalClose');
            const unsubmittedCount = document.getElementById('unsubmittedCount');
            const teacherList = document.getElementById('teacherList');

            // 数据展示
            const loadingSkeleton = document.getElementById('loadingSkeleton');
            const cardsList = document.getElementById('cardsList');
            const tableWrapper = document.getElementById('tableWrapper');
            const tableBody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');
            const errorMsg = document.getElementById('errorMsg');
            const btnRetry = document.getElementById('btnRetry');
            const countNumber = document.getElementById('countNumber');
            const dataCountInfo = document.getElementById('dataCountInfo');

            // 详情弹窗与排序
            const detailModal = document.getElementById('detailModal');
            const detailModalTitle = document.getElementById('detailModalTitle');
            const detailModalBody = document.getElementById('detailModalBody');
            const detailModalClose = document.getElementById('detailModalClose');
            const tableHeaders = document.querySelectorAll('.data-table th.sortable');

            // ============ 状态变量 ============
            let allSubmissions = [];
            let filteredSubmissions = [];
            let currentSubject = '';
            let isLoading = false;
            let toastTimer = null;
            let exportMenuOpen = false;
            let currentSortField = 'submitted_at';
            let currentSortOrder = 'desc';

            // ============ 教师总名单（按组别）===========
            const allTeachersByGroup = [
                { group: '公共科组', teachers: ['刘婷', '陈妙芬', '万佳欣', '曾萍', '武佳欣', '林思晓', '肖世珍', '王亮胜', '何坤青', '余静', '程晓慧', '谭翠', '吴佳钰', '江苗', '钟仪', '陈敏慧', '李奕蓉', '谭颖茵', '陈妍帆'] },
                { group: '素养学科组', teachers: ['吴家佳', '郭素萍', '朱晓萍', '胡凤玲', '张珩', '叶家宝', '王春燕', '郑成', '黄海帆', '李彩鑫', '上官名监', '陈泽林'] },
                { group: '计算机信息技术组', teachers: ['李晓冰', '郑春兰', '艾睿慧', '郑丽丽', '陈梓涛', '何琦琪', '陈秋燕', '胡旭妍', '方哲佳', '廖楚灵', '张洁冬', '王子波'] },
                { group: '电商数媒机器人组', teachers: ['陈楚词', '林嘉伟', '彭志崇', '陈锐鹏', '詹培波', '金少清', '韩同成'] },
                { group: '法律事务组', teachers: ['周思睿', '韦萌珊', '杜佳', '蔡梓然', '杨佳敏'] },
                { group: '社区公共特勤训练组', teachers: ['林金蓉', '莫清妮', '钟新生', '刘创杰', '陈进', '李顺豪', '李治荣'] }
            ];

            // 获取所有教师名单
            const getAllTeachers = () => allTeachersByGroup.flatMap(g => g.teachers);

            // ============ Canvas粒子系统 ============
            let particles = [];
            const isMobile = window.innerWidth < 520;
            const particleCount = isMobile ? 40 : 70;

            function resizeCanvas() {
                particleCanvas.width = window.innerWidth;
                particleCanvas.height = window.innerHeight;
            }

            function createParticles() {
                particles = [];
                const count = window.innerWidth < 520 ? 35 : 65;
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * particleCanvas.width,
                        y: Math.random() * particleCanvas.height,
                        radius: Math.random() * 1.8 + 0.4,
                        speedX: (Math.random() - 0.5) * 0.35,
                        speedY: (Math.random() - 0.5) * 0.35,
                        alpha: Math.random() * 0.5 + 0.15,
                        alphaSpeed: (Math.random() - 0.5) * 0.006,
                    });
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.alpha += p.alphaSpeed;

                    // 边界循环
                    if (p.x < -10) p.x = particleCanvas.width + 10;
                    if (p.x > particleCanvas.width + 10) p.x = -10;
                    if (p.y < -10) p.y = particleCanvas.height + 10;
                    if (p.y > particleCanvas.height + 10) p.y = -10;

                    // alpha范围
                    if (p.alpha > 0.55) p.alphaSpeed = -Math.abs(p.alphaSpeed);
                    if (p.alpha < 0.08) p.alphaSpeed = Math.abs(p.alphaSpeed);

                    // 绘制粒子
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius * 3);
                    gradient.addColorStop(0, `rgba(160,200,240,${p.alpha})`);
                    gradient.addColorStop(1, 'rgba(160,200,240,0)');
                    ctx.fillStyle = gradient;
                    ctx.fill();

                    // 连线
                    for (let j = i + 1; j < particles.length; j++) {
                        const p2 = particles[j];
                        const dx = p.x - p2.x;
                        const dy = p.y - p2.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 90) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            const lineAlpha = (1 - dist / 90) * 0.12;
                            ctx.strokeStyle = `rgba(140,180,220,${lineAlpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(animateParticles);
            }

            function initParticles() {
                resizeCanvas();
                createParticles();
                animateParticles();
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
                createParticles();
            });

            // ============ Toast ============
            function showToast(message, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'toast ' + (type ? 'toast-' + type : '');
                toast.offsetHeight;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                    toast.className = 'toast';
                }, 2000);
            }

            // ============ 数据获取 ============
            async function fetchData() {
                if (isLoading) return;
                isLoading = true;

                // 显示加载状态
                setUIState('loading');

                try {
                    const response = await fetch('https://quickform.cn/api/dv5xlravqc/all', {
                        method: 'GET',
                        headers: {
                            'Accept': 'application/json',
                        },
                    });

                    if (!response.ok) {
                        throw new Error(`服务器响应异常 (${response.status})`);
                    }

                    const data = await response.json();

                    if (!data.submissions || !Array.isArray(data.submissions)) {
                        throw new Error('数据格式异常');
                    }

                    allSubmissions = data.submissions;
                    // 按提交时间倒序排列
                    allSubmissions.sort((a, b) => {
                        return new Date(b.submitted_at) - new Date(a.submitted_at);
                    });

                    // 重置搜索和筛选
                    searchInput.value = '';
                    searchClear.classList.remove('visible');
                    currentSubject = '';
                    subjectFilterLabel.textContent = '全部学科';
                    filteredSubmissions = [...allSubmissions];

                    // 更新UI
                    updateStats();
                    updateSubjectChart();
                    renderDataList();
                    setUIState('data');

                    const total = data.total_submissions || allSubmissions.length;
                    console.log(`✅ 成功加载 ${allSubmissions.length} 条记录 (总计: ${total})`);

                } catch (error) {
                    console.error('❌ 数据加载失败:', error);
                    errorMsg.textContent = error.message || '请检查网络连接后重试';
                    setUIState('error');
                    showToast('数据加载失败，请重试', 'warning');
                } finally {
                    isLoading = false;
                }
            }

            function setUIState(state) {
                // 隐藏所有
                loadingSkeleton.style.display = 'none';
                cardsList.style.display = 'none';
                tableWrapper.classList.remove('active');
                tableWrapper.style.display = 'none';
                emptyState.classList.remove('show');
                errorState.classList.remove('show');
                dataCountInfo.style.display = 'none';
                subjectChartPanel.style.display = 'none';

                switch (state) {
                    case 'loading':
                        loadingSkeleton.style.display = 'flex';
                        break;
                    case 'data':
                        dataCountInfo.style.display = 'block';
                        subjectChartPanel.style.display = 'block';
                        if (filteredSubmissions.length === 0) {
                            emptyState.classList.add('show');
                        } else {
                            // 根据屏幕宽度决定默认视图
                            if (window.innerWidth >= 640) {
                                tableWrapper.style.display = 'block';
                                tableWrapper.classList.add('active');
                                cardsList.style.display = 'none';
                            } else {
                                tableWrapper.style.display = 'none';
                                tableWrapper.classList.remove('active');
                                cardsList.style.display = 'flex';
                            }
                        }
                        break;
                    case 'error':
                        errorState.classList.add('show');
                        subjectChartPanel.style.display = 'block';
                        break;

            // ============ 统计更新 ============
            function updateStats() {
                const total = allSubmissions.length;
                const uniqueSubjects = new Set(allSubmissions.map(s => s.subject).filter(Boolean));
                const uniqueTeachers = new Set(allSubmissions.map(s => s.name).filter(Boolean));

                statTotal.textContent = total;
                statSubjects.textContent = uniqueSubjects.size;
                statTeachers.textContent = uniqueTeachers.size;

                if (allSubmissions.length > 0) {
                    const latest = allSubmissions[0].submitted_at;
                    // 提取日期部分
                    const dateMatch = latest.match(/(\d{4}-\d{2}-\d{2})/);
                    statLatest.textContent = dateMatch ? dateMatch[1] : '--';
                } else {
                    statLatest.textContent = '--';
                }

                // 数字弹跳动画
                [statTotal, statSubjects, statTeachers, statLatest].forEach(el => {
                    el.style.transform = 'scale(1.08)';
                    setTimeout(() => {
                        el.style.transform = 'scale(1)';
                    }, 200);

            function updateSubjectChart() {
                const subjectCount = {};
                const allSubjects = [
                    '语文', '数学', '英语', '历史', '思政', '音乐', '体育',
                    '计算机', '信息技术', '工业机器人', '电子商务', '数字媒体',
                    '法律事务', '社区公共', '特勤训练'
                ];

                allSubmissions.forEach(s => {
                    const subj = s.subject;
                    if (subj) {
                        subjectCount[subj] = (subjectCount[subj] || 0) + 1;
                    }
                });

                const maxCount = Math.max(1, ...Object.values(subjectCount));
                const entries = allSubjects
                    .filter(subj => subjectCount[subj] !== undefined)
                    .sort((a, b) => (subjectCount[b] || 0) - (subjectCount[a] || 0));

                if (entries.length === 0) {
                    subjectBars.innerHTML =
                        '<span style="font-size:0.65rem;color:var(--text-muted);padding:20px;">暂无学科数据</span>';
                    return;
                }

                subjectBars.innerHTML = entries.map(subj => {
                    const count = subjectCount[subj] || 0;
                    const heightPercent = Math.max(8, (count / maxCount) * 100);
                    return `
                        <div class="subject-bar-item" title="${subj}: ${count}条">
                            <span class="subject-bar-count">${count}</span>
                            <div class="subject-bar" style="height:${heightPercent}%;"></div>
                            <span class="subject-bar-label">${subj.length > 3 ? subj.slice(0,3)+'…' : subj}</span>
                        </div>
                    `;
                }).join('');

                const uniqueSubjects = [...new Set(allSubmissions.map(s => s.subject).filter(Boolean))];
                subjectFilterMenu.innerHTML = '<button class="subject-filter-item' + (currentSubject === '' ? ' active' : '') + '" data-subject="">全部学科</button>' +
                    uniqueSubjects.map(subj =>
                        '<button class="subject-filter-item' + (currentSubject === subj ? ' active' : '') + '" data-subject="' + escapeHTML(subj) + '">' + escapeHTML(subj) + '</button>'
                    ).join('');
                bindSubjectFilterEvents();

            // ============ 搜索 + 学科筛选 ============
            function applyFilters() {
                const query = searchInput.value.trim().toLowerCase();

                filteredSubmissions = allSubmissions.filter(s => {
                    const name = (s.name || '').toLowerCase();
                    const subject = (s.subject || '').toLowerCase();
                    const matchSearch = query === '' || name.includes(query) || subject.includes(query);
                    const matchSubject = currentSubject === '' || s.subject === currentSubject;
                    return matchSearch && matchSubject;
                });

                if (query === '') {
                    searchClear.classList.remove('visible');
                } else {
                    searchClear.classList.add('visible');
                }

                applySort();
                renderDataList();
            }

            function applySort() {
                filteredSubmissions.sort((a, b) => {
                    let valA = a[currentSortField] || '';
                    let valB = b[currentSortField] || '';
                    
                    if (currentSortField === 'submitted_at') {
                        return currentSortOrder === 'desc' 
                            ? new Date(valB).getTime() - new Date(valA).getTime() 
                            : new Date(valA).getTime() - new Date(valB).getTime();
                    }
                    
                    return currentSortOrder === 'asc' 
                        ? String(valA).localeCompare(String(valB), 'zh-CN') 
                        : String(valB).localeCompare(String(valA), 'zh-CN');
                });
                
                // 更新表头图标
                tableHeaders.forEach(th => {
                    const icon = th.querySelector('.sort-icon');
                    if (th.getAttribute('data-sort') === currentSortField) {
                        icon.className = 'sort-icon ' + currentSortOrder;
                        icon.style.color = '';
                    } else {
                        icon.className = 'sort-icon';
                        icon.style.color = 'transparent';
                    }
                });
            }

            // 初始化表头排序事件
            tableHeaders.forEach(th => {
                th.addEventListener('click', () => {
                    const field = th.getAttribute('data-sort');
                    if (currentSortField === field) {
                        currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSortField = field;
                        currentSortOrder = 'desc'; // 默认降序
                    }
                    applySort();
                    renderDataList();
                });
            });

            // ============ 导出功能 ============
            function getExportData() {
                // 导出当前筛选的数据（如果有筛选）或全部数据
                return filteredSubmissions.length > 0 ? filteredSubmissions : allSubmissions;
            }

            function exportCSV() {
                const data = getExportData();
                if (data.length === 0) {
                    showToast('没有可导出的数据', 'warning');
                    return;
                }

                const headers = ['姓名', '学科', '收获一', '收获二', '收获三', '微改变', '新做法', '疑问', '核心素养思考', '提交时间'];
                const keys = ['name', 'subject', 'gain1', 'gain2', 'gain3', 'apply_micro', 'apply_new', 'question',
                    'core_literacy', 'submitted_at'
                ];

                // CSV BOM for UTF-8
                let csv = '\uFEFF';
                csv += headers.join(',') + '\n';

                data.forEach(row => {
                    const values = keys.map(k => {
                        let val = (row[k] || '').replace(/"/g, '""');
                        // 如果包含逗号、换行或引号，用引号包裹
                        if (val.includes(',') || val.includes('\n') || val.includes('"')) {
                            val = '"' + val + '"';
                        }
                        return val;
                    });
                    csv += values.join(',') + '\n';
                });

                downloadFile(csv, '教研反馈数据.csv', 'text/csv;charset=utf-8');
                showToast('CSV导出成功！', 'success');
            }

            function exportJSON() {
                const data = getExportData();
                if (data.length === 0) {
                    showToast('没有可导出的数据', 'warning');
                    return;
                }

                const jsonStr = JSON.stringify({
                    export_time: new Date().toISOString(),
                    total: data.length,
                    submissions: data,
                }, null, 2);

                downloadFile(jsonStr, '教研反馈数据.json', 'application/json;charset=utf-8');
                showToast('JSON导出成功！', 'success');
            }

            function exportXLS() {
                const data = getExportData();
                if (data.length === 0) {
                    showToast('没有可导出的数据', 'warning');
                    return;
                }

                const headers = ['姓名', '学科', '收获一', '收获二', '收获三', '微改变', '新做法', '疑问', '核心素养思考', '提交时间'];
                const keys = ['name', 'subject', 'gain1', 'gain2', 'gain3', 'apply_micro', 'apply_new', 'question',
                    'core_literacy', 'submitted_at'
                ];

                let html = `
                    <html xmlns:o="urn:schemas-microsoft-com:office:office"
                          xmlns:x="urn:schemas-microsoft-com:office:excel"
                          xmlns="http://www.w3.org/TR/REC-html40">
                    <head><meta charset="UTF-8">
                    <!--[if gte mso 9]><xml><x:ExcelWorkbook>
                        <x:ExcelWorksheets><x:ExcelWorksheet>
                        <x:Name>教研反馈数据</x:Name>
                        <x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
                    </x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]-->
                    </head><body><table border="1">
                    <thead><tr>
                `;

                headers.forEach(h => {
                    html += `<th>${escapeHTML(h)}</th>`;
                });
                html += '</tr></thead><tbody>';

                data.forEach(row => {
                    html += '<tr>';
                    keys.forEach(k => {
                        html += `<td>${escapeHTML(row[k] || '')}</td>`;
                    });
                    html += '</tr>';
                });

                html += '</tbody></table></body></html>';

                downloadFile(html, '教研反馈数据.xls', 'application/vnd.ms-excel;charset=utf-8');
                showToast('Excel导出成功！', 'success');
            }

            function downloadFile(content, filename, mimeType) {
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            exportMenu.querySelectorAll('.export-menu-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const format = item.getAttribute('data-format');
                    exportMenu.classList.remove('show');
                    exportMenuOpen = false;

                    switch (format) {
                        case 'csv':
                            exportCSV();
                            break;
                        case 'json':
                            exportJSON();
                            break;
                        case 'xls':
                            exportXLS();
                            break;
                    }
                });
            });

            // 点击其他区域关闭导出菜单
            document.addEventListener('click', (e) => {
                if (!exportDropdown.contains(e.target)) {
                    exportMenu.classList.remove('show');
                    exportMenuOpen = false;
                }
            });

            // ============ 学科筛选下拉 ============
            btnSubjectFilter.addEventListener('click', (e) => {
                e.stopPropagation();
                subjectFilterMenu.classList.toggle('show');
            });

            document.addEventListener('click', (e) => {
                if (!subjectFilterDropdown.contains(e.target)) {
                    subjectFilterMenu.classList.remove('show');
                }
            });

            // ============ 未提交教师弹窗 ============
            function showUnsubmittedModal() {
                const submittedNames = new Set(allSubmissions.map(s => s.name).filter(Boolean));
                
                const unsubmittedByGroup = allTeachersByGroup.map(groupData => ({
                    group: groupData.group,
                    teachers: groupData.teachers.filter(name => !submittedNames.has(name))
                })).filter(groupData => groupData.teachers.length > 0);

                const unsubmittedTeachers = unsubmittedByGroup.flatMap(g => g.teachers);
                unsubmittedCount.textContent = unsubmittedTeachers.length;

                teacherList.innerHTML = unsubmittedByGroup.map(groupData => {
                    const teachersHtml = groupData.teachers.map(name => 
                        '<span class="teacher-tag">' + escapeHTML(name) + '</span>'
                    ).join('');
                    return `
                        <div class="teacher-group">
                            <div class="teacher-group-header">📁 ${escapeHTML(groupData.group)} (${groupData.teachers.length}人)</div>
                            <div class="teacher-group-list">${teachersHtml}</div>
                        </div>
                    `;
                }).join('');

                if (unsubmittedTeachers.length === 0) {
                    teacherList.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px;">🎉 所有教师均已提交！</div>';
                }

                unsubmittedModal.classList.add('show');
            }

            btnUnsubmitted.addEventListener('click', () => {
                showUnsubmittedModal();
            });

            modalClose.addEventListener('click', () => {
                unsubmittedModal.classList.remove('show');
            });

            unsubmittedModal.addEventListener('click', (e) => {
                if (e.target === unsubmittedModal) {
                    unsubmittedModal.classList.remove('show');
                }
            });

            // ============ 刷新按钮 ============
            btnRefresh.addEventListener('click', () => {
                if (isLoading) return;
                fetchData();
                showToast('正在刷新数据...', '');
            });

            // ============ 重试按钮 ============
            btnRetry.addEventListener('click', () => {
                fetchData();
            });

            // ============ 窗口大小变化 ============
            let resizeDebounceTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeDebounceTimer);
                resizeDebounceTimer = setTimeout(() => {
                    if (filteredSubmissions.length > 0) {
                        if (window.innerWidth >= 640) {
                            tableWrapper.style.display = 'block';
                            tableWrapper.classList.add('active');
                            cardsList.style.display = 'none';
                        } else {
                            tableWrapper.style.display = 'none';
                            tableWrapper.classList.remove('active');
                            cardsList.style.display = 'flex';
                        }
                    }
                }, 250);
            });

            // ============ 工具函数 ============
            function escapeHTML(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function truncate(str, maxLen) {
                if (!str) return '—';
                if (str.length <= maxLen) return str;
                return str.slice(0, maxLen) + '…';
            }

            // ============ 初始化 ============
            function init() {
                initParticles();
                // 初始加载数据
                fetchData();
            }

            // 启动
            init();

            console.log('📊 教研数据大屏已就绪');
            console.log('   🔍 支持按姓名搜索');
            console.log('   📥 支持CSV/JSON/Excel导出');
            console.log('   📱 移动端卡片视图 | 🖥️ 桌面端表格视图');
        })();
    </script>
</body>
</html>
